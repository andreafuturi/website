name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named `copilot-setup-steps` for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Deno 2.x — not bundled in the runner image.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "~2"

      # Install and cache npm dependencies (vite, @preact/preset-vite, preact).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      # Restore the Deno module cache from a previous run so the agent can work
      # without re-downloading from deno.land, esm.sh, or cdn.skypack.dev.
      # The pre-fetch step below populates ~/.cache/deno so the agent never
      # needs outbound access to those domains during its own session.
      - name: Restore Deno module cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('server/importMap.json', 'server/deno.json') }}
          restore-keys: |
            deno-

      # Pre-fetch all remote URL imports (deno.land + esm.sh + cdn.skypack.dev)
      # so the agent session is fully offline-capable after setup.
      - name: Pre-fetch Deno remote dependencies
        run: |
          deno cache --config server/deno.json server/main.jsx
          deno cache --config server/deno.json lib/server-handler.js
          deno cache --config server/deno.json tests/build_test.js tests/routing_test.js tests/ssr_test.js
