name: "Copilot Setup Steps"

# Run automatically when this file changes, and allow manual runs from the Actions tab.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # Must be named `copilot-setup-steps` for Copilot to pick it up.
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Deno 2.x — not bundled in the runner image.
      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "~2"

      # Install and cache npm dependencies (vite, @preact/preset-vite, preact).
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm install

      # Cache Deno remote dependencies by resolving all URL imports up-front.
      # This covers server/main.jsx (esm.sh + deno.land imports) and the test
      # files (deno.land/std/assert).
      - name: Cache Deno dependencies
        run: |
          deno cache --config server/deno.json server/main.jsx
          deno cache --config server/deno.json tests/build_test.js tests/routing_test.js tests/ssr_test.js
